<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Tickets</title>
<link rel="icon" href="img/logoSeaal.PNG">

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    gap: 20px;
    padding: 20px;
}

/* LEFT PANEL */
.sidebar {
    width: 250px;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
}

.box {
    padding: 20px;
    color: white;
    margin-bottom: 15px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

.blue { background:#1f5fa8; }
.green { background:#198754; }
.red { background:#dc3545; }

/* MAIN */
.main {
    flex:1;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

.header {
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

button {
    padding:10px 20px;
    margin-right:10px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

button:disabled {
    background:#999 !important;
    cursor:not-allowed;
}

.btn-blue{background:#1f5fa8;}
.btn-green{background:#198754;}
.btn-red{background:#dc3545;}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{background:#eee;}

.current-ticket{
    background:#fff3cd;
    border:2px solid orange;
}

.called-ticket{
    background:#d3d3d3;
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="sidebar">
<h3>Résumé des Tickets</h3>

<div class="box blue">En attente : <span id="waiting">0</span></div>
<div class="box green">Clôturés : <span id="done">0</span></div>
<div class="box red">Abandonnés : <span id="cancel">0</span></div>
</div>

<!-- RIGHT -->
<div class="main">

<div class="header">
<div>👤 Agent</div>
<div id="time"></div>
</div>



<!-- BUTTONS -->
<button id="btnNext" class="btn-blue" onclick="nextTicket()">Suivant</button>
<button id="btnDone" class="btn-green" onclick="doneTicket()" disabled>Traité</button>
<button id="btnCancel" class="btn-red" onclick="cancelTicket()" disabled>Abandonné</button>
<button class="btn-blue" onclick="exportRapport()">📊 Export Rapport</button>
<button class="btn-red" onclick="resetTickets()">🗑 Reset Tickets</button>
<h3>Tickets</h3>

<table>
<thead>
<tr>
<th>Numéro</th>
<th>Service</th>
<th>Priorité</th>
<th>Guichet</th>
<th>Date</th>
</tr>
</thead>
<tbody id="ticketBody"></tbody>
</table>

</div>

<script>
let currentTicket=null;

const btnNext=document.getElementById('btnNext');
const btnDone=document.getElementById('btnDone');
const btnCancel=document.getElementById('btnCancel');

const token=localStorage.getItem("token");

/* CLOCK */
setInterval(()=>{
document.getElementById("time").innerText=
new Date().toLocaleString();
},1000);

/* LOAD TICKETS */
async function loadTickets(){

try{
const res=await fetch('/api/tickets',{
headers:{Authorization:"Bearer "+token}
});

const tickets=await res.json();

const tbody=document.getElementById('ticketBody');
tbody.innerHTML='';

let waiting=0,done=0,cancel=0;

tickets.forEach(t=>{

const row=document.createElement('tr');

/* grey when called */
if(t.statut==='appelé'){
row.classList.add('called-ticket');
}

/* highlight current */
if(currentTicket && currentTicket.id===t.id){
row.classList.add('current-ticket');
}

if(t.statut==='en attente' || t.statut==='appelé'){

if(t.statut==='en attente') waiting++;

row.innerHTML=`
<td>${t.ticket_number}</td>
<td>${t.type_service}</td>
<td>${t.prioritaire}</td>
<td>${t.guichet || "-"}</td>
<td>${new Date(t.date_creation).toLocaleString()}</td>
`;

tbody.appendChild(row);
}

if(t.statut==='clos') done++;
if(t.statut==='abandonné') cancel++;

});

document.getElementById('waiting').innerText=waiting;
document.getElementById('done').innerText=done;
document.getElementById('cancel').innerText=cancel;

}catch(err){
console.error(err);
}
}

/* NEXT */
async function nextTicket(){

if(currentTicket) return;

try{

const res=await fetch('/api/tickets/next',{
method:'POST',
headers:{
Authorization:"Bearer "+token,
"Content-Type":"application/json"
},
});

if(res.status===404){
alert("Aucun ticket en attente !");
return;
}

currentTicket=await res.json();

btnDone.disabled=false;
btnCancel.disabled=false;
btnNext.disabled=true;

loadTickets();

}catch(err){
console.error(err);
}
}

/* DONE */
async function doneTicket(){

if(!currentTicket) return;

await fetch(`/api/tickets/${currentTicket.id}/close`,{
method:'POST',
headers:{Authorization:"Bearer "+token}
});

resetState();
}

/* CANCEL */
async function cancelTicket(){

if(!currentTicket) return;

await fetch(`/api/tickets/${currentTicket.id}/cancel`,{
method:'POST',
headers:{Authorization:"Bearer "+token}
});

resetState();
}

/* RESET */
function resetState(){

currentTicket=null;

btnDone.disabled=true;
btnCancel.disabled=true;
btnNext.disabled=false;

loadTickets();
}
async function exportRapport() {

    try {

        const response = await fetch('/api/tickets/export', {
            headers: {
                Authorization: "Bearer " + token
            }
        });

        const blob = await response.blob();

        const url = window.URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = "rapport_tickets.xlsx";

        document.body.appendChild(a);
        a.click();
        a.remove();

        window.URL.revokeObjectURL(url);

    } catch (err) {
        console.error("Export error:", err);
    }
}
async function resetTickets() {

    const confirmDelete = confirm(
        "⚠️ Êtes-vous sûr de vouloir supprimer TOUS les tickets ?\n\nCette action est irréversible."
    );

    if (!confirmDelete) return;

    try {

        const res = await fetch('/api/tickets/reset', {
            method: 'DELETE',
            headers: {
                Authorization: "Bearer " + token
            }
        });

        const data = await res.json();

        alert(data.message);

        resetState(); // refresh interface

    } catch (err) {
        console.error("Reset error:", err);
    }
}
/* AUTO REFRESH */
setInterval(loadTickets,5000);
window.onload=loadTickets;

</script>

</body>
</html>
