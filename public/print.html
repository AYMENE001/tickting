<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Borne SEAAL</title>
    <link rel="icon" href="img/logoSeaal.PNG" type="image/x-icon">
<style>
body {
    font-family: Arial, sans-serif;
    background: #e6f2f7;
    text-align: center;
}
.logo {
    width: 120px;
    margin-top: 20px;
}
.services {
    margin-top: 20px;
}
.services button {
    width: 220px;
    padding: 15px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #004987;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
.services button:hover {
    background: #003366;
}
.priority {
    background: #009633 !important;
}
.ticket {
    border: 2px dashed black;
    padding: 20px;
    width: 260px;
    margin: auto;
    margin-top: 30px;
    background: white;
    display: none; /* hidden initially */
}
.ticket h1 {
    font-size: 45px;
    margin: 10px 0;
}
.ticket p {
    margin: 5px 0;
}
@media print {
    button {
        display: none;
    }
}

@media print {
    body * {
        visibility: hidden;
    }

    #ticketDiv, #ticketDiv * {
        visibility: visible;
    }

    #ticketDiv {
        position: absolute;
        left: 0;
        top: 0;
    }
}
</style>
</head>

<body>

<img src="img/logoSeaal.PNG" class="logo">
<h1>Borne File d'Attente</h1>

<!-- SERVICE BUTTONS -->
<div class="services">
   

    
    <div class="services">
    <button onclick="generateTicket('Paiement')">💳 Paiement</button>
    <button onclick="generateTicket('Réclamation')">📄 Réclamation</button>
    <button onclick="generateTicket('Information')">ℹ️ Information</button>
    <br>
    <button class="priority" id="togglePriority">⭐ Prioritaire</button>
</div>


<!-- TICKET DISPLAY -->
<div id="ticketDiv" style="display:none;">
    <canvas id="ticketCanvas" width="400" height="600"></canvas>
</div>

<script>
let priorityMode = false;

// Toggle priority mode
document.getElementById('togglePriority').addEventListener('click', () => {
    priorityMode = !priorityMode;
    const btn = document.getElementById('togglePriority');
    btn.innerText = priorityMode ? "⭐ Prioritaire (ON)" : "⭐ Prioritaire";
    btn.style.backgroundColor = priorityMode ? "#cc0000" : "#009633";
});

window.generateTicket = function(service) {

    const ticketDiv = document.getElementById('ticketDiv');
    ticketDiv.style.display = 'block';

    const canvas = document.getElementById('ticketCanvas');
    const ctx = canvas.getContext('2d');

    const img = new Image();

    img.onload = function () {

        // AFTER image ready → call backend
        fetch('/api/tickets', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                type_service: service,
                prioritaire: priorityMode ? "Oui" : "Non"
            })
        })
        .then(res => res.json())
        .then(data => {

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "black";
            ctx.font = "20px Arial";

            ctx.fillText("Service: " + service, 30, 120);
            ctx.fillText("Priorité: " + (priorityMode ? "Oui" : "Non"), 30, 160);
            ctx.fillText("Date: " + new Date().toLocaleString(), 30, 200);
            ctx.fillText("Ticket N°: " + data.ticket_number, 30, 240);

            console.log("Ticket inserted:", data);

            // ✅ FORCE PRINT AFTER RENDER
            setTimeout(() => {
                window.focus();
                window.print();
            }, 500);
        })
        .catch(err => console.error("Error inserting ticket:", err));
    };

    // load image LAST
    img.src = "img/apercu.png";
};
</script>

</body>
</html>
