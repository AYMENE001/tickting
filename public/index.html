<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Tickets</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

/* NAVBAR */
.navbar{
    background:#1f5fa8;
    color:white;
    padding:15px;
    display:flex;
    gap:20px;
}

.navbar button{
    background:none;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.navbar button:hover{
    text-decoration:underline;
}

/* CONTENT */
#content{
    padding:20px;
}

iframe{
    width:100%;
    height:90vh;
    border:none;
}

</style>
</head>

<body>

<div class="navbar">
    <button onclick="loadPage('tickets.html')">📋 Liste Attente</button>
    <button onclick="loadPage('users.html')">👤 Gestion Utilisateurs</button>
    <button onclick="loadPage('settings.html')">⚙ Paramétrage</button>
    <button onclick="logout()">🚪 Logout</button>
</div>

<div id="content">
    <iframe id="frame" src="tickets.html"></iframe>
</div>

<script>
// CHECK TOKEN
const token = localStorage.getItem("token");

if(!token){
    window.location.href="login.html";
}
function loadPage(page){
    document.getElementById("frame").src = page;
}
function logout(){
    localStorage.removeItem("token");
    window.location.href="login.html";
}
</script>

</body>
</html>
