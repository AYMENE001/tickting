<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Affichage</title>
 <link rel="icon" href="img/logoSeaal.PNG" type="image/x-icon">
<style>
body { font-family: Arial; margin:0; background:#e6f2f7;}
header { display:flex; justify-content:space-between; background:#004987; color:white; padding:10px;}
.main { display:flex; gap:20px; padding:20px;}
.left { width:300px;}
.right { flex:1; background:white; padding:20px; border-radius:10px;}
.ticket { border-left:8px solid #004987; padding:10px; margin-bottom:10px; background:#f9f9f9;}
</style>
</head>

<body> 

<header>
   <h1>Agence</h1>   <h1 id="agencyName"></h1>
    <div id="dateTime"></div>
</header>

<div class="main">

<div class="left">
<iframe src="https://www.youtube.com/embed/oYpL53gsRfw?autoplay=1&loop=1&playlist=oYpL53gsRfw&mute=1"
width="100%" height="400"></iframe>
</div>

<div class="right">
<h2>Tickets appelés</h2>
<div id="ticketList"></div>
</div>

</div>

<script>

// clock
setInterval(()=>{
document.getElementById("dateTime").innerText=new Date().toLocaleString();
},1000);
// Load agence name
async function loadAgency() {
    const res = await fetch('/api/settings/');
    const agence = await res.json();
    console.log('agence', agence);

    // Assuming agence is an array and you want the first one
    if (agence.length > 0) {
        document.getElementById('agencyName').innerText = "Agence " + agence[0].value;
    }
}
// LOAD CALLED
async function loadCalledTickets(){
    const res = await fetch('/api/tickets/called');
    const tickets = await res.json();

        const res1 = await fetch('/api/settings/');
    const agence = await res1.json();
console.log('agence',agence)
    const list = document.getElementById('ticketList');
    list.innerHTML='';

    tickets.forEach(t=>{
        const div=document.createElement('div');
        div.className='ticket';

        div.innerHTML=`
            <h2>${t.ticket_number} ${t.prioritaire==='Oui'?'⭐':''}</h2>
            <p>${t.type_service}</p>
            <h3>guichet : ${t.guichet} </h3>
            
        `;

        list.appendChild(div);
    });
}
setInterval(loadCalledTickets,3000);
// call on page load
window.onload = () => {
    loadAgency();
    loadCalledTickets();
};

</script>

</body>
</html>
