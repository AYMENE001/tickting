<!DOCTYPE html>
<html>
<head>
<title>Login</title>    <link rel="icon" href="img/logoSeaal.PNG" type="image/x-icon">
<style>
body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}
.box{
    background:white;
    padding:30px;
    border-radius:10px;
}
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #0056b3;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background-color: #004494;
};

</style>
</head>

<body>

<div class="box">

<h2>Login</h2>
    <img src="img/logoSeaal.PNG" style="display: block; margin: 0 auto; width: 150px;">

<form id="loginForm">
<input id="username" placeholder="Username" required>
<input id="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

<p id="msg"></p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",async e=>{

    e.preventDefault();

    const res = await fetch("/api/login",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            username:username.value,
            password:password.value
        })
    });

    const data = await res.json();

    if(data.success){

        // ✅ SAVE TOKEN
        localStorage.setItem("token",data.token);

        // go dashboard
        window.location.href="index.html";

    }else{
        msg.innerText="Login failed";
    }
});
</script>

</body>
</html>
